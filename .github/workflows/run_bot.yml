name: PinAffiliateBot Morning Publish

on:
  schedule:
    - cron: '0 2 * * *'   # 7:30 AM IST daily
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  morning-publish:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning publish or fallback CSV
        env:
          AMAZON_ACCESS_KEY:   ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY:   ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG:  ${{ secrets.AMAZON_PARTNER_TAG }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          BOARD_TECH:          ${{ secrets.BOARD_TECH }}
          BOARD_HOME:          ${{ secrets.BOARD_HOME }}
          BOARD_FITNESS:       ${{ secrets.BOARD_FITNESS }}
          BOARD_DEALS:         ${{ secrets.BOARD_DEALS }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          DAILY_PRODUCT_COUNT: '30'
          MAX_PRODUCTS_PER_KW: '5'
          MAX_PINS_PER_DAY: '30'
        run: python main.py --scheduled-run

      - name: Commit refreshed dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/products.csv data/pinterest_bulk_editor.csv data/daily_stats.json
          git add -f data/products.csv data/pinterest_bulk_editor.csv
          test ! -f data/pinterest_upload.csv || git add -f data/pinterest_upload.csv
          test ! -f data/daily_stats.json || git add -f data/daily_stats.json
          test ! -f data/pinterest_pins.csv || git add -f data/pinterest_pins.csv
          test ! -f data/posted_log.json || git add -f data/posted_log.json
          test ! -f data/products.json || git add -f data/products.json
          test ! -f data/trends.json || git add -f data/trends.json
          test ! -d output/images || git add -f output/images/
          git diff --cached --quiet || git commit -m "Run morning Pinterest publish path"
          git pull --rebase
          git push

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pinbot-logs-${{ github.run_number }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload morning publish outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pinbot-morning-output-${{ github.run_number }}
          path: |
            data/products.csv
            data/pinterest_pins.csv
            data/pinterest_upload.csv
            data/pinterest_bulk_editor.csv
            data/trends.json
            data/daily_stats.json
            data/posted_log.json
            output/images/
          if-no-files-found: ignore
          retention-days: 7
