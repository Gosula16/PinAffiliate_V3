name: PinAffiliate Morning Publish

on:
  schedule:
    - cron: '0 2 * * *'   # 7:30 AM IST daily
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  morning-publish:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning publish or fallback CSV
        env:
          AMAZON_ACCESS_KEY:   ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY:   ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG:  ${{ secrets.AMAZON_PARTNER_TAG }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          BOARD_TECH:          ${{ secrets.BOARD_TECH }}
          BOARD_HOME:          ${{ secrets.BOARD_HOME }}
          BOARD_FITNESS:       ${{ secrets.BOARD_FITNESS }}
          BOARD_DEALS:         ${{ secrets.BOARD_DEALS }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
          HF_TEXT_MODEL: cardiffnlp/twitter-roberta-base-sentiment-latest
          HF_ZERO_SHOT_MODEL: facebook/bart-large-mnli
          HF_IMAGE_MODEL: google/vit-base-patch16-224
          HF_MAX_AI_CALLS: '24'
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          DAILY_PRODUCT_COUNT: '30'
          MAX_PRODUCTS_PER_KW: '5'
          MAX_PINS_PER_DAY: '30'
        run: python main.py --scheduled-run

      - name: Commit refreshed dashboard data
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions@users.noreply.github.com"
          git add -f data/products.csv data/pinterest_bulk_editor.csv
          test ! -f data/pinterest_upload.csv || git add -f data/pinterest_upload.csv
          test ! -f data/daily_stats.json || git add -f data/daily_stats.json
          test ! -f data/pinterest_pins.csv || git add -f data/pinterest_pins.csv
          test ! -f data/posted_log.json || git add -f data/posted_log.json
          test ! -f data/products.json || git add -f data/products.json
          test ! -f data/trends.json || git add -f data/trends.json
          test ! -d output/images || git add -f output/images/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Run morning Pinterest publish path"
            git fetch origin main
            git pull --rebase origin main
            for i in {1..3}; do
              if git push origin main; then
                echo "Push successful"
                exit 0
              else
                echo "Push attempt $i failed, retrying after 5 seconds..."
                sleep 5
              fi
            done
            echo "Push failed after 3 attempts"
            exit 1
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publisher-logs-${{ github.run_number }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload morning publish outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publisher-morning-output-${{ github.run_number }}
          path: |
            data/products.csv
            data/pinterest_pins.csv
            data/pinterest_upload.csv
            data/pinterest_bulk_editor.csv
            data/trends.json
            data/daily_stats.json
            data/posted_log.json
            output/images/
          if-no-files-found: ignore
          retention-days: 7
