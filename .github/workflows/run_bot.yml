name: PinAffiliateBot Daily Product Feed

on:
  schedule:
    - cron: '0 2 * * *'   # 7:30 AM IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-products:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate 30 daily trending products
        env:
          AMAZON_ACCESS_KEY:   ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY:   ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG:  ${{ secrets.AMAZON_PARTNER_TAG }}
          DAILY_PRODUCT_COUNT: '30'
          MAX_PRODUCTS_PER_KW: '5'
        run: python main.py --products

      - name: Commit refreshed product feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products.csv data/pinterest_bulk_editor.csv
          git add -f data/trends.json
          git diff --cached --quiet || git commit -m "Refresh daily product feed"
          git push

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pinbot-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: Upload product CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pinbot-csv-${{ github.run_number }}
          path: |
            data/products.csv
            data/pinterest_bulk_editor.csv
            data/trends.json
          retention-days: 7
